# Zenithmon tests (active PR gate from S0 -- see Games/Zenithmon/Docs/CIPolicy.md).
#
# Modeled on dp-tests.yml (the proven GPU-less gate; see its header for the
# full history of the headless-boot approach). Summary of the constraints:
#   - GitHub-hosted windows-latest runners have no GPU / Vulkan ICD. The engine
#     boots with --headless (Zenith_CommandLine::IsHeadless short-circuits Flux
#     init), and graphics-mandatory tests (m_bRequiresGraphics) are skipped.
#   - Baked assets are git-ignored, so a fresh checkout has NO Assets/ content;
#     asset/scene-dependent automated tests must exists-guard and RequestSkip
#     (the commit-94813489 pattern). The CI backbone is the pure-logic headless
#     suites (boot unit tests + headless automated tests).
#   - slang-llvm.dll is > 100 MB, so Slang DLLs are fetched per run by
#     .github/actions/zenith-setup, never committed.
#
# Required check name: `zm-tests` (branch protection is a manual GitHub-UI
# step -- Games/Zenithmon/Docs/ManualSetupChecklist.md).

name: zm-tests

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      runner:
        description: 'Runner override (e.g. self-hosted with GPU).'
        required: false
        default: 'windows-latest'

permissions:
  contents: read

# Superseded PR pushes cancel the in-flight run; master pushes always complete.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  zm-tests:
    name: zm-tests
    runs-on: ${{ github.event.inputs.runner || 'windows-latest' }}
    timeout-minutes: 60

    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      VCPKG_DISABLE_METRICS: 1
      SLANG_VERSION: '2026.1'
      VULKAN_SDK_VERSION: '1.3.290.0'
      # Single source for where the runner writes + the artifact uploads from.
      ZM_RESULTS_DIR: Build/artifacts/test_results/zenithmon

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Provision Zenith toolchain (MSBuild + vcpkg + Vulkan + Slang)
        uses: ./.github/actions/zenith-setup
        with:
          vulkan-sdk-version: ${{ env.VULKAN_SDK_VERSION }}
          slang-version: ${{ env.SLANG_VERSION }}

      - name: Regenerate solution (Sharpmake)
        shell: pwsh
        working-directory: Build
        run: |
          ./regen.ps1 -UseDotnet
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Build Zenithmon
        shell: pwsh
        run: |
          msbuild Games\Zenithmon\zenithmon_win64.sln `
              /t:Zenithmon `
              /p:Configuration=Vulkan_vs2022_Debug_Win64_True `
              /p:Platform=x64 `
              /p:WindowsTargetPlatformVersion=10.0 `
              -maxCpuCount `
              -nologo `
              -clp:Summary `
              -clp:ErrorsOnly
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Build Zenithmon (D3D12 null backend -- backend-neutrality link proof)
        shell: pwsh
        run: |
          # The D3D12 null backend is a compile + link conformance oracle proving
          # the Flux renderer surface is backend-neutral (zero real rendering;
          # Vulkan stays the shipping backend). _False omits editor/tools +
          # Slang/Vulkan and links the system d3d12/dxgi import libs only.
          msbuild Games\Zenithmon\zenithmon_win64.sln `
              /t:Zenithmon `
              /p:Configuration=D3D12_vs2022_Debug_Win64_False `
              /p:Platform=x64 `
              /p:WindowsTargetPlatformVersion=10.0 `
              -maxCpuCount `
              -nologo `
              -clp:Summary `
              -clp:ErrorsOnly
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Copy runtime DLLs into exe output dir
        shell: pwsh
        run: |
          $exeDir = 'Games\Zenithmon\Build\output\win64\vulkan_vs2022_debug_win64_true'
          if (-not (Test-Path $exeDir)) {
              Write-Error "exe output dir does not exist: $exeDir"
              exit 1
          }
          # 1. All slang DLLs (the post-build event only copies slang.dll itself;
          #    the rest of the slang dependency tree -- slang-rt, slang-glslang,
          #    slang-glsl-module, slang-llvm, slang-compiler, gfx -- are needed
          #    at runtime to avoid STATUS_DLL_NOT_FOUND).
          Copy-Item 'Middleware\slang\bin\*.dll' $exeDir -Force
          # 2. vulkan-1.dll from the Vulkan SDK (the system Windows runtime may
          #    not have a loader installed on the CI runner).
          $vkLoader = Join-Path $env:VULKAN_SDK 'Bin\vulkan-1.dll'
          if (Test-Path $vkLoader) {
              Copy-Item $vkLoader $exeDir -Force
          } else {
              Write-Warning "vulkan-1.dll not found at $vkLoader; relying on system loader."
          }
          Write-Host "DLLs in exe output dir:"
          Get-ChildItem "$exeDir\*.dll" | Select-Object Name, @{N='SizeMB';E={[math]::Round($_.Length/1MB,1)}} | Sort-Object Name | Format-Table -AutoSize | Out-String | Write-Host

      - name: Verify exe boots far enough to enumerate tests
        shell: pwsh
        run: |
          $exe = 'Games\Zenithmon\Build\output\win64\vulkan_vs2022_debug_win64_true\zenithmon.exe'
          # --list-automated-tests exits 0 cleanly without entering main loop;
          # --headless skips Vulkan init entirely so vkEnumeratePhysicalDevices
          # never runs on the GPU-less runner.
          $out = & $exe --list-automated-tests --skip-tool-exports --skip-unit-tests --headless 2>&1
          $code = $LASTEXITCODE
          Write-Host "exe --list exited $code; first 30 lines:"
          $out | Select-Object -First 30 | Out-Host
          if ($code -ne 0) {
              Write-Host "... tail (last 40 lines) ..."
              $out | Select-Object -Last 40 | Out-Host
              Write-Error "exe failed to enumerate tests (exit $code) -- engine can't boot on this runner."
              exit 1
          }

      - name: Run boot unit tests (engine + Zenithmon ZM_* suites)
        shell: pwsh
        run: |
          # The enumerate step and `zenith test` both pass --skip-unit-tests for
          # speed, so the boot ZENITH_TEST suite -- engine units PLUS Zenithmon's
          # ZM_* data-core cases (the S1+ gate backbone) -- is exercised here via the
          # shared engine-gate helper. It boots headless with tool-exports ON (some
          # engine unit tests reload generated assets), watchdog-kills the known
          # tools-build idle after the units line is logged, and asserts the full
          # registered count ran with 0 failed. Bump -Baseline when the ZM_* (or
          # engine) unit-test count changes -- see Docs/CIPolicy.md.
          $exe = 'Games\Zenithmon\Build\output\win64\vulkan_vs2022_debug_win64_true\zenithmon.exe'
          pwsh -NoProfile -File Tools\run_unit_gate.ps1 -Exe $exe -Baseline 1676
          if ($LASTEXITCODE -ne 0) { Write-Error "boot unit tests failed (see log above)"; exit $LASTEXITCODE }

      - name: Run Zenithmon tests
        shell: pwsh
        run: |
          # zenith test batches every registered test in one headless process;
          # graphics-mandatory tests (m_bRequiresGraphics) are skipped on the
          # GPU-less runner, asset-dependent tests RequestSkip on the assets-
          # absent checkout.
          & .\zenith.bat test Zenithmon --headless --results-dir $env:ZM_RESULTS_DIR
          $testExit = $LASTEXITCODE
          Write-Host "zenith test exit: $testExit"
          if ($testExit -ne 0) { exit $testExit }

      - name: Upload test result JSON artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zm-test-results
          path: ${{ env.ZM_RESULTS_DIR }}/
          if-no-files-found: warn
