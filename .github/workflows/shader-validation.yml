# shader-validation — the gate that enforces "each render feature owns its shaders".
#
# Builds + RUNS the canonical (Tools=True) FluxCompiler and fails if:
#   (a) the catalog is structurally invalid (Flux_ShaderCatalog::Validate), or
#   (b) the catalog/feature parity check fails (ValidateFeatureParity) — i.e. a
#       feature was registered without a catalog entry, or a catalog include was
#       added without a RegisterFeature line, or
#   (c) running FluxCompiler leaves the checked-in generated tree DIRTY — i.e. a
#       shader's .slang / .spv / .spv.refl / Generated header is stale or missing.
#
# Unlike dp-tests, FluxCompiler does NO Vulkan device work (it only drives Slang
# to emit SPIR-V), so the exe runs fine on the GPU-less windows-latest runner.
#
# This is the mechanism that makes "modify a feature's shader = 0 central edits"
# and "new feature = 2 central lines" safe: forget a line, or commit a stale
# artifact, and this job fails. Provisioning mirrors dp-tests.yml / cb-tests.yml.

name: shader-validation

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

# Superseded PR pushes cancel the in-flight run; master pushes always complete.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  shader-validation:
    name: shader-validation
    runs-on: windows-latest
    timeout-minutes: 45

    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      VCPKG_DISABLE_METRICS: 1
      SLANG_VERSION: '2026.1'
      VULKAN_SDK_VERSION: '1.3.290.0'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # The .spv are Git-LFS tracked (.gitattributes). Without lfs:true the
          # working tree holds LFS *pointers*; FluxCompiler then writes the real
          # SPIR-V over them, so the final `git status` sees content-vs-pointer and
          # reports all 108 .spv "modified" (the long-standing gate failure). Fetch
          # LFS so the tree starts as real content and a byte-identical regen is clean.
          lfs: true

      - name: Provision Zenith toolchain (MSBuild + vcpkg + Vulkan + Slang)
        uses: ./.github/actions/zenith-setup
        with:
          vulkan-sdk-version: ${{ env.VULKAN_SDK_VERSION }}
          slang-version: ${{ env.SLANG_VERSION }}

      - name: Regenerate solution (Sharpmake)
        shell: pwsh
        working-directory: Build
        run: |
          ./regen.ps1 -UseDotnet
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Build FluxCompiler (canonical Tools=True)
        shell: pwsh
        run: |
          msbuild Build\zenith_engine_win64.sln `
              /t:FluxCompiler `
              /p:Configuration=Vulkan_vs2022_Release_Win64_True `
              /p:Platform=x64 `
              /p:WindowsTargetPlatformVersion=10.0 `
              -maxCpuCount -nologo -clp:Summary -clp:ErrorsOnly
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Run FluxCompiler (Validate + ValidateFeatureParity + regen + prune)
        shell: pwsh
        run: |
          $exeDir = 'FluxCompiler\output\win64\vulkan_vs2022_release_win64_true'
          # FluxCompiler drives Slang (no Vulkan device) — copy the Slang DLL tree
          # next to the exe so it resolves at runtime.
          Copy-Item 'Middleware\slang\bin\*.dll' $exeDir -Force
          $exe = Join-Path $exeDir 'fluxcompiler.exe'
          & $exe
          if ($LASTEXITCODE -ne 0) {
              Write-Error "FluxCompiler failed (Validate / ValidateFeatureParity / codegen) — exit $LASTEXITCODE"
              exit $LASTEXITCODE
          }

      - name: Gate — generated shader tree must be clean after a canonical run
        shell: pwsh
        run: |
          # Use `git status` (NOT a path-scoped `git diff`): the artifacts are
          # .spv/.spv.refl next to the .slang in subsystem dirs, plus NEW untracked
          # files and per-game shader trees — a diff misses all three.
          $dirty = git status --porcelain --untracked-files=all -- Zenith/Flux/Shaders Games/*/Shaders
          if ($dirty) {
              Write-Host "::error::Shader tree is stale — a canonical FluxCompiler run produced changes that are not committed."
              Write-Host "Run FluxCompiler (Vulkan_vs2022_Release_Win64_True) locally and commit the regenerated tree."
              Write-Host "--- offending paths ---"
              $dirty | Out-Host
              exit 1
          }
          Write-Host "Shader tree is clean — generated artifacts match a canonical FluxCompiler run."
