# layering-gate (wave8.7-layering-gate): Flux<->EntityComponent coupling ratchet.
#
# Runs Tools/layering_gate.ps1 on every PR + push-to-master. The gate scans
# Zenith/EntityComponent and Zenith/Flux for cross-layer #include edges and
# compares them against Tools/layering_allowlist.txt. It FAILS (exit 1) if any
# NEW (non-allow-listed) Flux<->EntityComponent include edge appears, enforcing
# that the coupling can only shrink. Removing a leak is always allowed.

name: layering-gate

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  layering-gate:
    name: layering-gate
    runs-on: windows-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run layering_gate.ps1
        shell: pwsh
        run: |
          pwsh -NoProfile -File ./Tools/layering_gate.ps1
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
