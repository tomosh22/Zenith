# layering-gate: architectural-structure + convention-lint ratchet.
#
# As of the architecture-analysis change this gate is enforced by
# Tools/analyze_code_complexity.py (via CheckComplexity.bat --gate-group
# architecture,lints), which SUBSUMES the retired Tools/layering_gate.ps1. It still
# enforces the original Flux<->EntityComponent + ECS-leaf ratchets (raw-string parity,
# same Tools/layering_allowlist.txt + Tools/ecs_leaf_allowlist.txt files) and ADDS the
# full-DAG layer-direction, encapsulation, hub and convention-lint ratchets
# (Tools/architecture_allowlist.txt + Tools/lints_allowlist.txt).
#
# Each ratchet is per-finding allow-list membership: a NEW non-allow-listed finding
# FAILS (exit 1); removing one leaves a stale allow-list line (INFO only). The gate runs
# the SAME one-pass analysis as complexity-gate but --gate-group keeps the two required
# checks independent (a complexity regression does NOT fail this check, and vice-versa).
#
# Required check name: `layering-gate`.

name: layering-gate

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  layering-gate:
    name: layering-gate
    runs-on: windows-latest
    # 15 min: checkout + python/tree-sitter setup are runner-bound (~4-5 min); the
    # analysis itself takes well under a minute on the engine source.
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install tree-sitter parser
        run: python -m pip install tree-sitter tree-sitter-cpp

      - name: Run architecture + lint gate
        working-directory: ${{ env.GITHUB_WORKSPACE }}
        shell: cmd
        run: Tools\CheckComplexity.bat --parser tree-sitter --gate-group architecture,lints

      - name: Upload architecture report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: layering-report
          path: complexity_report_ci/
          if-no-files-found: warn
