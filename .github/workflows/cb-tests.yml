# CityBuilder tests -- active PR + push gate on master.
#
# Mirrors dp-tests.yml (the DevilsPlayground gate). The engine's --headless
# boot mode (Zenith_CommandLine::IsHeadless) short-circuits Flux init / VMA
# leaf functions / Editor flush paths / view-creation null-handle asserts, so
# the suite runs on GPU-less GitHub windows-latest runners. The graphics-
# mandatory terrain tests (CB_Deform* / CB_Paint* / CB_Physics*) are tagged
# m_bRequiresGraphics=true and the harness skips them headless (counts as
# pass); run windowed locally (omit -Headless) to exercise them.
#
# Required check name: `cb-tests`.
#
# Runtime DLLs are fetched per run (same as dp-tests; too large to commit):
#   - slang-llvm.dll: 105 MB. Fetched from Slang v2026.1 GitHub release.
#   - opencv_world4100d.dll: 120.6 MB. Fetched from OpenCV 4.10.0 release.
#   - vulkan-1.dll: copied from LunarG Vulkan SDK 1.3.290.0 install.

name: cb-tests

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      runner:
        description: 'Runner override (e.g. self-hosted with GPU).'
        required: false
        default: 'windows-latest'

permissions:
  contents: read

jobs:
  cb-tests:
    name: cb-tests
    runs-on: ${{ github.event.inputs.runner || 'windows-latest' }}
    timeout-minutes: 60

    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      VCPKG_DISABLE_METRICS: 1
      SLANG_VERSION: '2026.1'
      VULKAN_SDK_VERSION: '1.3.290.0'
      OPENCV_VERSION: '4.10.0'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Cache vcpkg installed/
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\installed
          key: vcpkg-x64-windows-pkgs-cbtests-v1
          restore-keys: |
            vcpkg-x64-windows-pkgs-
            vcpkg-x64-windows-

      - name: Install vcpkg packages
        shell: pwsh
        run: |
          $packages = @(
              'assimp',
              'curl',
              'draco',
              'kubazip',
              'minizip',
              'jhasse-poly2tri',
              'pugixml',
              'zlib'
          )
          & 'C:\vcpkg\vcpkg.exe' install @packages --triplet x64-windows --recurse
          if ($LASTEXITCODE -ne 0) { exit 1 }
          & 'C:\vcpkg\vcpkg.exe' integrate install
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Cache Vulkan SDK
        id: cache-vulkan
        uses: actions/cache@v4
        with:
          path: C:\VulkanSDK\${{ env.VULKAN_SDK_VERSION }}
          key: vulkan-sdk-${{ env.VULKAN_SDK_VERSION }}-v1

      - name: Install Vulkan SDK
        if: steps.cache-vulkan.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $version = $env:VULKAN_SDK_VERSION
          $url = "https://sdk.lunarg.com/sdk/download/$version/windows/VulkanSDK-$version-Installer.exe"
          Write-Host "Downloading Vulkan SDK $version from $url"
          Invoke-WebRequest -Uri $url -OutFile vulkan-installer.exe -UseBasicParsing
          Write-Host "Installing Vulkan SDK (silent)..."
          $proc = Start-Process -FilePath .\vulkan-installer.exe `
              -ArgumentList @(
                  "--root", "C:\VulkanSDK\$version",
                  "--accept-licenses",
                  "--default-answer",
                  "--confirm-command", "install"
              ) `
              -Wait -PassThru
          if ($proc.ExitCode -ne 0) {
              Write-Error "Vulkan SDK installer exited $($proc.ExitCode)"
              exit 1
          }
          Write-Host "Vulkan SDK installed."

      - name: Export Vulkan SDK env vars
        shell: pwsh
        run: |
          $sdkRoot = "C:\VulkanSDK\$env:VULKAN_SDK_VERSION"
          echo "VULKAN_SDK=$sdkRoot" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "$sdkRoot\Bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Download Slang runtime DLLs (v${{ env.SLANG_VERSION }})
        shell: pwsh
        run: |
          $version = $env:SLANG_VERSION
          $url = "https://github.com/shader-slang/slang/releases/download/v$version/slang-$version-windows-x86_64.zip"
          $tmpDir = 'C:\tmp\slang-release'
          $zipPath = "$tmpDir\slang.zip"
          New-Item -ItemType Directory -Path $tmpDir -Force | Out-Null
          Write-Host "Downloading $url"
          Invoke-WebRequest -Uri $url -OutFile $zipPath -UseBasicParsing
          Expand-Archive -Path $zipPath -DestinationPath $tmpDir -Force
          # Slang release layout: top-level bin/ contains DLLs; the .slang
          # standard module dir is bin/slang-standard-module-<ver>/ which is
          # already tracked in repo.
          $candidates = Get-ChildItem -Path $tmpDir -Directory -Filter 'bin' -Recurse
          if (-not $candidates) {
              Write-Error "No 'bin' directory in slang release zip; layout changed?"
              Get-ChildItem $tmpDir -Recurse | Select-Object FullName | Out-Host
              exit 1
          }
          $slangBin = $candidates | Select-Object -First 1
          Write-Host "Slang release bin: $($slangBin.FullName)"
          # Repo target dir already exists (tracked .slang files); add the DLLs.
          New-Item -ItemType Directory -Path 'Middleware\slang\bin' -Force | Out-Null
          Copy-Item "$($slangBin.FullName)\*.dll" 'Middleware\slang\bin\' -Force
          Write-Host "Slang DLLs provisioned:"
          Get-ChildItem 'Middleware\slang\bin\*.dll' | Select-Object Name, @{N='SizeMB';E={[math]::Round($_.Length/1MB,1)}} | Format-Table -AutoSize | Out-String | Write-Host

      - name: Cache OpenCV runtime DLLs
        id: cache-opencv
        uses: actions/cache@v4
        with:
          path: C:\opencv-runtime
          key: opencv-${{ env.OPENCV_VERSION }}-v1

      - name: Download OpenCV runtime DLLs
        if: steps.cache-opencv.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          # The exe directly imports opencv_world4100d.dll (per dumpbin
          # /dependents -- an engine dependency, so every game exe in the
          # solution imports it). It is 120.6 MB -- over GitHub's 100 MB
          # per-file commit limit, so cannot be tracked. Fetch from the
          # official OpenCV release zip (Windows self-extracting 7zip
          # archive, ~250 MB) and extract just the world DLL.
          $version = $env:OPENCV_VERSION
          $compactVersion = $version -replace '\.', ''   # 4.10.0 -> 4100
          $url = "https://github.com/opencv/opencv/releases/download/$version/opencv-$version-windows.exe"
          $tmpDir = 'C:\tmp\opencv-release'
          $exePath = "$tmpDir\opencv.exe"
          New-Item -ItemType Directory -Path $tmpDir -Force | Out-Null
          Write-Host "Downloading $url"
          Invoke-WebRequest -Uri $url -OutFile $exePath -UseBasicParsing
          $sevenZip = 'C:\Program Files\7-Zip\7z.exe'
          if (-not (Test-Path $sevenZip)) {
              Write-Error "7-Zip not found at $sevenZip"
              exit 1
          }
          Write-Host "Extracting opencv release with 7-Zip..."
          & $sevenZip x $exePath "-o$tmpDir\extracted" -y | Out-Null
          if ($LASTEXITCODE -ne 0) {
              Write-Error "7z extract exited $LASTEXITCODE"
              exit 1
          }
          # Layout inside: opencv/build/x64/vc16/bin/{opencv_world<v>.dll, opencv_world<v>d.dll}
          $binDir = Get-ChildItem -Path "$tmpDir\extracted" -Directory -Filter 'bin' -Recurse |
                    Where-Object { $_.FullName -match 'vc1[6-9]\\bin$' } |
                    Select-Object -First 1
          if (-not $binDir) {
              Write-Error "No bin/ dir matching vc16+ found in extracted opencv. Listing:"
              Get-ChildItem -Path "$tmpDir\extracted" -Recurse -Directory | Select-Object FullName | Out-Host
              exit 1
          }
          New-Item -ItemType Directory -Path C:\opencv-runtime -Force | Out-Null
          $debugDll = Join-Path $binDir.FullName "opencv_world${compactVersion}d.dll"
          $releaseDll = Join-Path $binDir.FullName "opencv_world${compactVersion}.dll"
          if (Test-Path $debugDll) {
              Copy-Item $debugDll C:\opencv-runtime\ -Force
              Write-Host "Cached debug DLL: $debugDll -> C:\opencv-runtime\"
          }
          if (Test-Path $releaseDll) {
              Copy-Item $releaseDll C:\opencv-runtime\ -Force
              Write-Host "Cached release DLL: $releaseDll -> C:\opencv-runtime\"
          }
          Get-ChildItem C:\opencv-runtime | Select-Object Name, @{N='SizeMB';E={[math]::Round($_.Length/1MB,1)}} | Format-Table -AutoSize | Out-String | Write-Host

      - name: Regenerate solution (Sharpmake)
        shell: pwsh
        working-directory: Build
        run: |
          dotnet exec '..\Sharpmake\Sharpmake.Application.dll' "/sources('Sharpmake_Common.cs', 'Sharpmake_FreeType.cs', 'Sharpmake_Msdfgen.cs', 'Sharpmake_MsdfAtlasGen.cs', 'Sharpmake_Zenith.cs', 'Sharpmake_ZenithECS.cs', 'Sharpmake_SentinelECS.cs', 'Sharpmake_FluxCompiler.cs', 'Sharpmake_Games.cs', 'Sharpmake_TilePuzzleLevelGen.cs', 'Sharpmake_TilePuzzleRegistryViewer.cs')"
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Build CityBuilder
        shell: pwsh
        run: |
          msbuild Build\zenith_win64.sln `
              /t:CityBuilder `
              /p:Configuration=vs2022_Debug_Win64_True `
              /p:Platform=x64 `
              /p:WindowsTargetPlatformVersion=10.0 `
              -maxCpuCount `
              -nologo `
              -clp:Summary `
              -clp:ErrorsOnly
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Copy runtime DLLs into exe output dir
        shell: pwsh
        run: |
          $exeDir = 'Games\CityBuilder\Build\output\win64\vs2022_debug_win64_true'
          if (-not (Test-Path $exeDir)) {
              Write-Error "exe output dir does not exist: $exeDir"
              exit 1
          }
          # 1. All slang DLLs (the post-build event only copies slang.dll itself;
          #    the rest of the slang dependency tree -- slang-rt, slang-glslang,
          #    slang-glsl-module, slang-llvm, slang-compiler, gfx -- are needed
          #    at runtime to avoid STATUS_DLL_NOT_FOUND).
          Copy-Item 'Middleware\slang\bin\*.dll' $exeDir -Force
          # 2. vulkan-1.dll from the Vulkan SDK (the system Windows runtime may
          #    not have a loader installed on the CI runner).
          $vkLoader = Join-Path $env:VULKAN_SDK 'Bin\vulkan-1.dll'
          if (Test-Path $vkLoader) {
              Copy-Item $vkLoader $exeDir -Force
          } else {
              Write-Warning "vulkan-1.dll not found at $vkLoader; relying on system loader."
          }
          # 3. opencv_world4100d.dll: 120.6 MB; over GitHub's 100 MB per-file
          #    commit limit so fetched per-run (cached via Cache OpenCV step).
          #    The exe imports opencv_world directly (engine dependency).
          if (Test-Path 'C:\opencv-runtime') {
              Copy-Item 'C:\opencv-runtime\*.dll' $exeDir -Force
          }
          Write-Host "DLLs in exe output dir:"
          Get-ChildItem "$exeDir\*.dll" | Select-Object Name, @{N='SizeMB';E={[math]::Round($_.Length/1MB,1)}} | Sort-Object Name | Format-Table -AutoSize | Out-String | Write-Host

      - name: Verify exe boots far enough to enumerate tests
        shell: pwsh
        run: |
          $exe = 'Games\CityBuilder\Build\output\win64\vs2022_debug_win64_true\citybuilder.exe'
          # --list-automated-tests exits 0 cleanly without entering main loop;
          # --headless skips Vulkan init entirely (Zenith_CommandLine::IsHeadless
          # short-circuits Flux::EarlyInitialise / LateInitialise / Shutdown so
          # vkEnumeratePhysicalDevices never runs on the GPU-less runner).
          $out = & $exe --list-automated-tests --skip-tool-exports --skip-unit-tests --headless 2>&1
          $code = $LASTEXITCODE
          Write-Host "exe --list exited $code; first 30 lines:"
          $out | Select-Object -First 30 | Out-Host
          if ($code -ne 0) {
              Write-Host "... tail (last 40 lines) ..."
              $out | Select-Object -Last 40 | Out-Host
              Write-Error "exe failed to enumerate tests (exit $code) -- engine can't boot on this runner."
              exit 1
          }

      - name: Run CityBuilder tests
        shell: pwsh
        run: |
          # pwsh 7+ handles UTF-8 cleanly. windows-latest has pwsh preinstalled
          # at C:\Program Files\PowerShell\7\pwsh.exe. run_cb_tests.ps1 -Headless
          # batches every registered test in one process and skips the graphics-
          # mandatory terrain tests (m_bRequiresGraphics).
          & pwsh.exe -NoProfile -ExecutionPolicy Bypass -File '.\Tools\run_cb_tests.ps1' -Headless
          $testExit = $LASTEXITCODE
          Write-Host "run_cb_tests exit: $testExit"
          if ($testExit -ne 0) { exit $testExit }

      - name: Upload test result JSON artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cb-test-results
          path: build/citybuilder_test_results/
          if-no-files-found: warn
