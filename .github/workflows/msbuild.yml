# separate terms of service, privacy policy, and support
# documentation.

name: MSBuild

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  # Path to the solution file relative to the root of the project.
  SOLUTION_FILE_PATH: Games/Test/Build/zenith_win64.vcxproj

  # Configuration type to build.
  # You can convert this to a build matrix if you need coverage of multiple configuration types.
  # https://docs.github.com/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
  BUILD_CONFIGURATION: vs2022_Debug_Win64_False
  BUILD_PLATFORM: x64

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v1.0.2

    - name: Build
      working-directory: ${{env.GITHUB_WORKSPACE}}
      # Add additional options to the MSBuild command line here (like platform or verbosity level).
      # See https://docs.microsoft.com/visualstudio/msbuild/msbuild-command-line-reference
      run: msbuild /m /p:Configuration=${{env.BUILD_CONFIGURATION}} /p:Platform=${{env.BUILD_PLATFORM}} ${{env.SOLUTION_FILE_PATH}}

  complexity-gate:
    # Runs analyze_code_complexity.py via CheckComplexity.bat against engine
    # source. Gate thresholds are set at the current worst-case engine ceiling
    # in Tools/CheckComplexity.bat (max-cc=100, max-cognitive=150, max-nesting=8,
    # max-loc=900), so the tree passes today. A new PR that introduces a
    # function above any threshold fails this job and must refactor before
    # merging. Thresholds tighten progressively as Tier 2 refactors land.
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install tree-sitter parser
      run: python -m pip install tree-sitter tree-sitter-cpp

    - name: Run complexity gate
      working-directory: ${{env.GITHUB_WORKSPACE}}
      shell: cmd
      run: Tools\CheckComplexity.bat --parser tree-sitter

    - name: Upload complexity report on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: complexity-report
        path: complexity_report_ci/
        if-no-files-found: warn
