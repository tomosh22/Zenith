# Engine gate -- the two engine-level proofs no game workflow covers:
#
#   1. Sentinel leaf-purity links (SentinelECS / SentinelPhysics / SentinelAI):
#      exes that link EXACTLY the leaf libs (zenithbase/ecs/physics/ai) with no
#      aggregate engine. They exist only in ToolsEnabled=False configs
#      (Sharpmake_Solutions.cs) and an accidental leaf->engine edge fails their
#      link with a hard unresolved external. Fixed + green as of 2026-07
#      (the leaf seams are enumerated in Tests/Sentinel*/sentinel_platform.cpp).
#   2. The engine unit-test suite at boot (dedicated gate; the game test
#      workflows run with --skip-unit-tests). Combat carries the gate: its
#      Vulkan_Debug_True build also proves the engine lib transitively.
#
# Baseline lives in Tools/run_unit_gate.ps1 (-Baseline default); bump it there
# when adding engine unit tests (Tools/test_scaffold.ps1 reuses the same script,
# so there is exactly one place to bump).
#
# Rollout: land with workflow_dispatch; enable pull_request/push after two
# green dispatch runs; mark required after a week of burn-in.
# Required check name (eventually): `engine-gate`.
#
# Android/AGDE deliberately NOT covered here: the AGDE VSIX is absent from
# hosted runners and slow/flaky to install; descriptor-level AGDE generation
# is already exercised by every workflow's regen step. Revisit when a
# self-hosted runner exists.

name: engine-gate

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      runner:
        description: 'Runner override (e.g. self-hosted with GPU).'
        required: false
        default: 'windows-latest'

permissions:
  contents: read

# Superseded PR pushes cancel the in-flight run; master pushes always complete.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  engine-gate:
    name: engine-gate
    runs-on: ${{ github.event.inputs.runner || 'windows-latest' }}
    timeout-minutes: 75

    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      VCPKG_DISABLE_METRICS: 1
      SLANG_VERSION: '2026.1'
      VULKAN_SDK_VERSION: '1.3.290.0'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # The engine unit gate runs the tool asset exports at boot:
          # run_unit_gate.ps1 deliberately omits --skip-tool-exports so the
          # asset-export unit tests (ProceduralTree::*, StickFigure*) find their
          # generated assets. Those exports read the LFS-tracked SOURCE meshes +
          # textures (*.fbx/*.png/*.tga/*.dds/... per .gitattributes). Without
          # lfs:true actions/checkout leaves those as LFS pointer files, and the
          # export crashes on boot (right after "AssetRegistry initialized",
          # before any unit test). cb/dp-tests pass without LFS only because they
          # run --skip-tool-exports. Same fix as shader-validation.yml.
          lfs: true

      - name: Provision Zenith toolchain (MSBuild + vcpkg + Vulkan + Slang)
        uses: ./.github/actions/zenith-setup
        with:
          vulkan-sdk-version: ${{ env.VULKAN_SDK_VERSION }}
          slang-version: ${{ env.SLANG_VERSION }}

      - name: Regenerate solution (Sharpmake)
        shell: pwsh
        working-directory: Build
        run: |
          ./regen.ps1 -UseDotnet
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Build Sentinels (leaf-purity link proof, Vulkan _False)
        shell: pwsh
        run: |
          # Sentinels exist ONLY in ToolsEnabled=False configs. Each /t: is a
          # separate invocation so a failure names its sentinel.
          foreach ($t in @('SentinelECS', 'SentinelPhysics', 'SentinelAI')) {
              msbuild Build\zenith_engine_win64.sln `
                  /t:$t `
                  /p:Configuration=Vulkan_vs2022_Debug_Win64_False `
                  /p:Platform=x64 `
                  /p:WindowsTargetPlatformVersion=10.0 `
                  -maxCpuCount -nologo -clp:Summary -clp:ErrorsOnly
              if ($LASTEXITCODE -ne 0) { Write-Error "$t failed"; exit 1 }
          }

      - name: Run Sentinels (leaf-proof exes execute clean)
        shell: pwsh
        run: |
          $dir = 'Build\output\win64\vulkan_vs2022_debug_win64_false'
          foreach ($s in @('sentinelecs', 'sentinelphysics', 'sentinelai')) {
              & "$dir\$s.exe"
              if ($LASTEXITCODE -ne 0) { Write-Error "$s exited $LASTEXITCODE"; exit 1 }
              Write-Host "$s OK"
          }

      - name: Build Combat (Vulkan_Debug_True; engine lib transitively)
        shell: pwsh
        run: |
          msbuild Games\Combat\combat_win64.sln `
              /t:Combat `
              /p:Configuration=Vulkan_vs2022_Debug_Win64_True `
              /p:Platform=x64 `
              /p:WindowsTargetPlatformVersion=10.0 `
              -maxCpuCount -nologo -clp:Summary -clp:ErrorsOnly
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Copy runtime DLLs into exe output dir
        shell: pwsh
        run: |
          $exeDir = 'Games\Combat\Build\output\win64\vulkan_vs2022_debug_win64_true'
          Copy-Item 'Middleware\slang\bin\*.dll' $exeDir -Force
          $vkLoader = Join-Path $env:VULKAN_SDK 'Bin\vulkan-1.dll'
          if (Test-Path $vkLoader) { Copy-Item $vkLoader $exeDir -Force }

      - name: Run engine unit tests at boot (baseline + known-flake tolerance)
        shell: pwsh
        run: |
          & pwsh.exe -NoProfile -ExecutionPolicy Bypass -File .\Tools\run_unit_gate.ps1 `
              -Exe 'Games/Combat/Build/output/win64/vulkan_vs2022_debug_win64_true/combat.exe'
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload boot log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: engine-gate-boot-log
          path: ${{ runner.temp }}/unit_gate_boot.log
          if-no-files-found: ignore
