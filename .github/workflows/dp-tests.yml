# DevilsPlayground tests (MVP-0.0.3 — ACTIVE PR gate as of 2026-05-13).
#
# **CURRENT STATE: pull_request + push triggers ACTIVE; required check on master.**
# How: the engine has a `--headless` boot mode (Zenith_CommandLine::IsHeadless)
# that short-circuits Flux init / VMA leaf functions / Editor flush paths /
# view-creation null-handle asserts. 9 graphics-mandatory DP tests are tagged
# `m_bRequiresGraphics = true` and the harness skips them (counts as pass).
# See DecisionLog 2026-05-13 entry on Q-2026-05-12-007 for full rationale.
#
# Historical context (kept for the next "this approach blocked, what now?" moment):
#
# Why disabled: the DP exe is Vulkan-mandatory at boot (it calls
# vkEnumeratePhysicalDevices during Flux::EarlyInitialise and waits for
# a real GPU device). GitHub-hosted windows-latest runners have no GPU
# and no Vulkan ICD. First iteration of this workflow exited 0xC0000135
# (a missing runtime DLL, since fixed). Second iteration hung indefinitely at
# `--list-automated-tests` after a clean compile/link, then a clean
# DLL inventory step -- the engine deadlocked enumerating Vulkan
# devices. Cancelled after 40+ min.
#
# Reactivating this workflow as a PR gate requires ONE of:
#   1. A paid GitHub GPU runner (vetoed: zero-external-spend rule).
#   2. Mesa lavapipe / SwiftShader on the runner, with engine code
#      changes to handle software-only Vulkan and not query NVIDIA-
#      specific extensions on startup. Non-trivial engine work.
#   3. A `--no-graphics` engine boot mode that skips Vulkan init
#      entirely for tests that don't need rendering. Cleanest path.
#      Most DP tests don't exercise rendering directly (they assert
#      on state, events, or component values per TestPlan.md section 0.3).
#
# Until one of those lands, this file's value is:
#   - Documenting the test infra design (build + DLL provisioning +
#     pwsh invocation + artifact upload) for the eventual reactivation.
#   - Manual `workflow_dispatch` for debugging the DLL provisioning
#     and build pipeline without GPU dependency at that surface.
#
# Build + DLL pieces below work (verified through the Build step on
# iteration 2). Only the exe-execution piece blocks.
#
# Required check name (when reactivated): `dp-tests`.
#
# File-size constraints captured here so the next reactivation attempt
# doesn't re-discover them:
#   - slang-llvm.dll: 105 MB (> 100 MB per-file commit limit). Fetched
#     from Slang v2026.1 GitHub release per run.
#   - vulkan-1.dll: copied from LunarG Vulkan SDK 1.3.290.0 install.

name: dp-tests

on:
  # Active PR gate as of 2026-05-13; see Docs/DecisionLog.md entry on Q-2026-05-12-007.
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      runner:
        description: 'Runner override (e.g. self-hosted with GPU).'
        required: false
        default: 'windows-latest'

permissions:
  contents: read

# Superseded PR pushes cancel the in-flight run; master pushes always complete.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  dp-tests:
    name: dp-tests
    runs-on: ${{ github.event.inputs.runner || 'windows-latest' }}
    timeout-minutes: 60

    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      VCPKG_DISABLE_METRICS: 1
      SLANG_VERSION: '2026.1'
      VULKAN_SDK_VERSION: '1.3.290.0'
      # Single source for where the runner writes + the artifact uploads from
      # (runner default is the same; pinned here so a future move is a 1-line edit).
      DP_RESULTS_DIR: Build/artifacts/test_results/devilsplayground

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Provision Zenith toolchain (MSBuild + vcpkg + Vulkan + Slang)
        uses: ./.github/actions/zenith-setup
        with:
          vulkan-sdk-version: ${{ env.VULKAN_SDK_VERSION }}
          slang-version: ${{ env.SLANG_VERSION }}

      - name: Regenerate solution (Sharpmake)
        shell: pwsh
        working-directory: Build
        run: |
          ./regen.ps1 -UseDotnet
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Build DevilsPlayground
        shell: pwsh
        run: |
          msbuild Games\DevilsPlayground\devilsplayground_win64.sln `
              /t:DevilsPlayground `
              /p:Configuration=Vulkan_vs2022_Debug_Win64_True `
              /p:Platform=x64 `
              /p:WindowsTargetPlatformVersion=10.0 `
              -maxCpuCount `
              -nologo `
              -clp:Summary `
              -clp:ErrorsOnly
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Build DevilsPlayground (D3D12 null backend -- backend-neutrality link proof)
        shell: pwsh
        run: |
          # The D3D12 null backend is a compile + link conformance oracle proving
          # the Flux renderer surface is backend-neutral (zero real rendering;
          # Vulkan stays the shipping backend). _False omits editor/tools +
          # Slang/Vulkan and links the system d3d12/dxgi import libs only.
          msbuild Games\DevilsPlayground\devilsplayground_win64.sln `
              /t:DevilsPlayground `
              /p:Configuration=D3D12_vs2022_Debug_Win64_False `
              /p:Platform=x64 `
              /p:WindowsTargetPlatformVersion=10.0 `
              -maxCpuCount `
              -nologo `
              -clp:Summary `
              -clp:ErrorsOnly
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Copy runtime DLLs into exe output dir
        shell: pwsh
        run: |
          $exeDir = 'Games\DevilsPlayground\Build\output\win64\vulkan_vs2022_debug_win64_true'
          if (-not (Test-Path $exeDir)) {
              Write-Error "exe output dir does not exist: $exeDir"
              exit 1
          }
          # 1. All slang DLLs (the post-build event only copies slang.dll itself;
          #    the rest of the slang dependency tree -- slang-rt, slang-glslang,
          #    slang-glsl-module, slang-llvm, slang-compiler, gfx -- are needed
          #    at runtime to avoid STATUS_DLL_NOT_FOUND).
          Copy-Item 'Middleware\slang\bin\*.dll' $exeDir -Force
          # 2. vulkan-1.dll from the Vulkan SDK (the system Windows runtime may
          #    not have a loader installed on the CI runner).
          $vkLoader = Join-Path $env:VULKAN_SDK 'Bin\vulkan-1.dll'
          if (Test-Path $vkLoader) {
              Copy-Item $vkLoader $exeDir -Force
          } else {
              Write-Warning "vulkan-1.dll not found at $vkLoader; relying on system loader."
          }
          Write-Host "DLLs in exe output dir:"
          Get-ChildItem "$exeDir\*.dll" | Select-Object Name, @{N='SizeMB';E={[math]::Round($_.Length/1MB,1)}} | Sort-Object Name | Format-Table -AutoSize | Out-String | Write-Host

      - name: Verify exe boots far enough to enumerate tests
        shell: pwsh
        run: |
          $exe = 'Games\DevilsPlayground\Build\output\win64\vulkan_vs2022_debug_win64_true\devilsplayground.exe'
          # --list-automated-tests exits 0 cleanly without entering main loop;
          # --headless skips Vulkan init entirely (Zenith_CommandLine::IsHeadless
          # short-circuits Flux::EarlyInitialise / LateInitialise / Shutdown so
          # vkEnumeratePhysicalDevices never runs on the GPU-less runner).
          $out = & $exe --list-automated-tests --skip-tool-exports --skip-unit-tests --headless 2>&1
          $code = $LASTEXITCODE
          Write-Host "exe --list exited $code; first 30 lines:"
          $out | Select-Object -First 30 | Out-Host
          if ($code -ne 0) {
              Write-Host "... tail (last 40 lines) ..."
              $out | Select-Object -Last 40 | Out-Host
              Write-Error "exe failed to enumerate tests (exit $code) -- engine can't boot on this runner."
              exit 1
          }

      - name: Run DP tests
        shell: pwsh
        run: |
          # pwsh 7+ handles UTF-8 cleanly (the runner script has em-dashes
          # in its top-of-file usage comment that crash PS5.1 -- see
          # Questions.md Q-2026-05-12-005). windows-latest has pwsh
          # preinstalled at C:\Program Files\PowerShell\7\pwsh.exe.
          & pwsh.exe -NoProfile -ExecutionPolicy Bypass -File '.\Tools\run_dp_tests.ps1' -Headless -ResultsDir $env:DP_RESULTS_DIR
          $testExit = $LASTEXITCODE
          Write-Host "run_dp_tests exit: $testExit"
          if ($testExit -ne 0) { exit $testExit }

      - name: Upload test result JSON artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dp-test-results
          path: ${{ env.DP_RESULTS_DIR }}/
          if-no-files-found: warn
